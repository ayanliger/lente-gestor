<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="theme-color"
      content="#f6fafc"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#07111d"
      media="(prefers-color-scheme: dark)"
    />
    <title>Lente Gestor — Transparência fiscal municipal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <script>
      /* Anti-flash: aplica o tema salvo (ou preferência do SO) antes do
         React montar, evitando um piscar entre light e dark. */
      (function () {
        try {
          var stored = localStorage.getItem("lente:theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          var theme = stored === "light" || stored === "dark"
            ? stored
            : prefersDark ? "dark" : "light";
          if (theme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
