# Golden set de 10 perguntas — base do eval evolutivo do RAG.
#
# Distribuição deliberada:
#   3 × PCA × execução         (cruzamento flagship do produto)
#   2 × LRF puras              (limites constitucionais)
#   2 × contratos específicos
#   2 × cruzamento LRF × contratos (thinking)
#   1 × recusa esperada         (valida NAO_SEI)
#
# Cada entrada traz:
#   id                      identificador estável (golden-XXX)
#   pergunta                texto em português, como o gestor falaria
#   intencao                categoria para agregação de métricas
#   chaves_esperadas_top6   lista de globs `chave_unica` que precisam aparecer
#                           entre os 6 primeiros recuperados. `*` é wildcard
#                           simples de um segmento (match por startswith+endswith).
#   deve_citar              True = resposta deve conter ≥1 citação [n];
#                           False = resposta deve ser NAO_SEI
#   motivo_inclusao         por que esta pergunta vale estar no golden set

- id: golden-001
  pergunta: "Por que Saúde está acima do orçamento previsto no PCA em 2024?"
  intencao: pca_vs_execucao
  chaves_esperadas_top6:
    - "resumo_pca:2024:Saúde"
    - "resumo_funcao:2024:*:Saúde"
  deve_citar: true
  motivo_inclusao: "Pergunta-vitrine do documento estratégico; exige cruzamento PCA × execução."

