services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lente-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lente}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lente_dev}
      POSTGRES_DB: ${POSTGRES_DB:-lente}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lente}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
